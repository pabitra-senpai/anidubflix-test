<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Details - Anidubflix</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .details-hero {
      height: 60vh;
      position: relative;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: flex-end;
    }
    .details-hero::after {
      content: '';
      position: absolute;
      top:0; left:0; width:100%; height:100%;
      background: linear-gradient(to top, var(--bg-color) 100%, transparent);
      z-index: 1;
    }
    .details-container {
      position: relative;
      z-index: 2;
      display: flex;
      gap: 2rem;
      max-width: 1400px;
      margin: -150px auto 0;
      padding: 0 4% 3rem;
    }
    .details-poster {
      width: 250px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      flex-shrink: 0;
    }
    .details-poster img {
      width: 100%;
      display: block;
    }
    .details-info {
      flex-grow: 1;
      padding-top: 100px;
    }
    .missing-info-list {
      margin-top: 1.5rem;
      margin-bottom: 2rem;
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.8;
    }
    .missing-info-list strong {
      color: var(--text-color);
    }
    @media (max-width: 768px) {
      .details-container {
        flex-direction: column;
        align-items: center;
        margin-top: -50px;
        text-align: center;
      }
      .details-poster {
        width: 180px;
      }
      .details-info {
        padding-top: 0;
      }
    }
  </style>
</head>
<body>

  <header>
    <nav class="navbar">
      <a href="index.html" class="logo">
        <svg width="180" height="40" viewBox="0 0 180 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ff003c" />
              <stop offset="100%" stop-color="#00ffe7" />
            </linearGradient>
          </defs>
          <rect x="2" y="5" width="30" height="30" rx="6" fill="url(#logo-grad)" opacity="0.15" stroke="url(#logo-grad)" stroke-width="1.5"/>
          <path d="M12 12L22 20L12 28V12Z" fill="url(#logo-grad)"/>
          <text x="42" y="27" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="20" fill="url(#logo-grad)" style="letter-spacing: 0.5px;">ANIDUB</text>
          <text x="122" y="27" font-family="'Segoe UI', Arial, sans-serif" font-weight="400" font-size="20" fill="#ffffff" style="letter-spacing: 0.5px;">FLIX</text>
        </svg>
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="anime.html">Anime</a></li>
      </ul>
    </nav>
  </header>

  <div class="details-hero" id="details-bg"></div>

  <div class="details-container">
    <div class="details-poster">
      <img id="details-img" src="" alt="">
    </div>
    <div class="details-info">
      <h1 id="details-title" style="font-size: 2.5rem; margin-bottom: 0.5rem;"></h1>
      <p id="details-dub" style="color: var(--accent-color); font-weight: bold; margin-bottom: 1rem;"></p>
      <div class="slide-meta" id="details-meta" style="margin-bottom: 1.5rem;"></div>
      <p id="details-desc" style="line-height: 1.6; color: var(--text-secondary); margin-bottom: 1.5rem;"></p>
      
      <div class="missing-info-list">
        <div><strong>Audio:</strong> <span id="details-audio"></span></div>
        <div><strong>Genres:</strong> <span id="details-genres"></span></div>
      </div>

      <div style="display: flex; gap: 1rem;">
        <a id="watch-btn" class="btn btn-primary"><i class="fas fa-play"></i> Watch Now</a>
        <button id="bookmark-btn" class="btn btn-secondary" onclick=""></button>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');
      if (!id) return;

      const anime = await window.fetchAnimeDetails(id);
      if (!anime) return;

      document.getElementById('details-bg').style.backgroundImage = `url('${anime.banner || anime.poster}')`;
      document.getElementById('details-img').src = anime.poster;
      document.getElementById('details-title').textContent = anime.title;
      document.getElementById('details-dub').textContent = anime.dubType;
      document.getElementById('details-desc').textContent = anime.description;
      
      let seasonAndEpisodeMeta = '';
      if (anime.type === "Series") {
        const totalEp = anime.episodes ? anime.episodes.length : 0;
        const seasonNum = anime.season || 1;
        seasonAndEpisodeMeta = `<span><i class="fas fa-tv"></i> Season ${seasonNum} (${totalEp} Episodes)</span>`;
      } else {
        seasonAndEpisodeMeta = `<span><i class="fas fa-film"></i> Movie</span>`;
      }

      document.getElementById('details-meta').innerHTML = `
        <span><i class="fas fa-star"></i> ${anime.rating}</span>
        <span><i class="fas fa-calendar-alt"></i> ${anime.releaseYear}</span>
        ${seasonAndEpisodeMeta}
      `;

      const audioList = anime.audio ? anime.audio.join(', ') : 'Hindi';
      const genresList = anime.genres ? anime.genres.join(', ') : 'N/A';
      document.getElementById('details-audio').textContent = audioList;
      document.getElementById('details-genres').textContent = genresList;

      document.getElementById('watch-btn').href = `watch.html?id=${anime.id}&ep=1`;
      
      const bookmarkBtn = document.getElementById('bookmark-btn');
      bookmarkBtn.setAttribute('onclick', `toggleBookmark('${anime.id}')`);
      updateBookmarkButtonUI(anime.id);
    });
  </script>
</body>
</html>
